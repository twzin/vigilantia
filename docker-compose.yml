version: "3.9"

# Duas redes: interna (ES, auth, parser inacessíveis externamente) e externa (gateway + frontend).
# Mitiga STRIDE: Spoofing, Tampering e Information Disclosure por isolamento de rede.
networks:
  vigilantia-internal:
    driver: bridge
    internal: true   # sem rota para a internet — serviços internos não são alcançáveis externamente
  vigilantia-external:
    driver: bridge

volumes:
  es_data:
  pg_data:

services:

  # ── Elasticsearch ────────────────────────────────────────────────────────────
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.13.4
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=true
      - ELASTIC_PASSWORD=${ELASTICSEARCH_PASSWORD}
      - bootstrap.memory_lock=true
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
    ulimits:
      memlock:
        soft: -1
        hard: -1
    volumes:
      - es_data:/usr/share/elasticsearch/data
    networks:
      - vigilantia-internal
    healthcheck:
      test:
        - CMD-SHELL
        - >
          curl -s -u elastic:${ELASTICSEARCH_PASSWORD}
          http://localhost:9200/_cluster/health
          | grep -qE '"status":"(green|yellow)"'
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 60s

  # ── PostgreSQL ───────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    env_file: .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - pg_data:/var/lib/postgresql/data
    networks:
      - vigilantia-internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ── Auth Service ─────────────────────────────────────────────────────────────
  auth:
    build:
      context: ./auth
    env_file: .env
    networks:
      - vigilantia-internal
    depends_on:
      elasticsearch:
        condition: service_healthy
      postgres:
        condition: service_healthy
    restart: unless-stopped

  # ── Parser Service ───────────────────────────────────────────────────────────
  parser:
    build:
      context: ./parser
    env_file: .env
    networks:
      - vigilantia-internal
    depends_on:
      elasticsearch:
        condition: service_healthy
    restart: unless-stopped

  # ── API Gateway ──────────────────────────────────────────────────────────────
  # Único ponto de entrada externo; conectado às duas redes.
  gateway:
    build:
      context: ./gateway
    env_file: .env
    ports:
      - "8000:8000"
    networks:
      - vigilantia-internal
      - vigilantia-external
    depends_on:
      auth:
        condition: service_started
      parser:
        condition: service_started
    restart: unless-stopped

  # ── Filebeat — Syslog Collector ─────────────────────────────────────────────
  # Recebe syslog via UDP/TCP 5140 e grava em syslog-raw-* no Elasticsearch.
  # O parser normaliza esses eventos para vigilantia-logs a cada 5 segundos.
  filebeat:
    image: docker.elastic.co/beats/filebeat:8.13.4
    user: root
    volumes:
      - ./filebeat/filebeat.yml:/usr/share/filebeat/filebeat.yml:ro
    environment:
      - ELASTICSEARCH_URL=http://elasticsearch:9200
      - ELASTICSEARCH_PASSWORD=${ELASTICSEARCH_PASSWORD}
    ports:
      - "5140:5140/udp"
      - "5140:5140/tcp"
    networks:
      - vigilantia-internal
    depends_on:
      elasticsearch:
        condition: service_healthy
    restart: unless-stopped
    command: ["filebeat", "-e", "-strict.perms=false"]

  # ── Frontend (React + Nginx) ─────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      args:
        VITE_GATEWAY_URL: ${VITE_GATEWAY_URL:-http://localhost:8000}
    ports:
      - "3000:80"
    networks:
      - vigilantia-external
    depends_on:
      - gateway
    restart: unless-stopped
