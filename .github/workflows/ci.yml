name: Vigilantia DevSecOps CI/CD

on:
  push:
    branches: [ main, development ]
  pull_request:
    branches: [ main ]

jobs:

  # ── SAST: análise estática do código Python ──────────────────────────────────
  sast_backend_python:
    name: SAST (Bandit)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Bandit
        run: pip install bandit

      - name: Run Bandit (SAST)
        run: bandit -r auth/ parser/ gateway/ -ll

  # ── SCA: scan de vulnerabilidades em dependências e imagens ──────────────────
  sca_dependency_scan:
    name: SCA (Trivy FS Scan)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'table'
          exit-code: '1'
          ignore-unfixed: true
          vuln-type: 'os,library'
          severity: 'CRITICAL,HIGH'

  # ── CD: build e push das imagens Docker (apenas em push para main) ────────────
  cd_build_push:
    name: CD (Build & Push Images)
    runs-on: ubuntu-latest
    needs: [ sast_backend_python, sca_dependency_scan ]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login no GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build e push — auth
        uses: docker/build-push-action@v5
        with:
          context: ./auth
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/vigilantia-auth:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build e push — parser
        uses: docker/build-push-action@v5
        with:
          context: ./parser
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/vigilantia-parser:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build e push — gateway
        uses: docker/build-push-action@v5
        with:
          context: ./gateway
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/vigilantia-gateway:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build e push — frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/vigilantia-frontend:latest
          build-args: |
            VITE_GATEWAY_URL=http://localhost:8000
          cache-from: type=gha
          cache-to: type=gha,mode=max
