name: Vigilantia DevSecOps CI/CD

on:
  push:
    branches: [ main, development ]
  pull_request:
    branches: [ main ]

jobs:

  # ── SAST: análise estática do código Python ──────────────────────────────────
  sast_backend_python:
    name: SAST (Bandit)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Bandit
        run: pip install bandit

      - name: Run Bandit (SAST)
        run: bandit -r auth/ parser/ gateway/ -ll

  # ── SCA: scan de vulnerabilidades em dependências e imagens ──────────────────
  sca_dependency_scan:
    name: SCA (Trivy FS Scan)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'table'
          exit-code: '1'
          ignore-unfixed: true
          vuln-type: 'os,library'
          severity: 'CRITICAL,HIGH'

  # ── CD: build e push das imagens Docker (apenas em push para main) ────────────
  cd_build_push:
    name: CD (Build & Push Images)
    runs-on: ubuntu-latest
    needs: [ sast_backend_python, sca_dependency_scan ]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login no GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build e push — auth
        uses: docker/build-push-action@v5
        with:
          context: ./auth
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/vigilantia-auth:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build e push — parser
        uses: docker/build-push-action@v5
        with:
          context: ./parser
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/vigilantia-parser:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build e push — gateway
        uses: docker/build-push-action@v5
        with:
          context: ./gateway
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/vigilantia-gateway:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build e push — frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/vigilantia-frontend:latest
          build-args: |
            VITE_GATEWAY_URL=http://localhost:8000
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── CD: deploy no Kubernetes (cluster kind efêmero no runner) ────────────────
  cd_deploy:
    name: CD (Deploy K8s — kind)
    runs-on: ubuntu-latest
    needs: [ cd_build_push ]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Instalar kind
        run: |
          curl -Lo ./kind https://kind.sigs.k8s.io/dl/v0.23.0/kind-linux-amd64
          chmod +x ./kind && sudo mv ./kind /usr/local/bin/kind

      - name: Criar cluster kind
        run: kind create cluster --name vigilantia --wait 60s

      - name: Instalar sealed-secrets controller
        run: |
          kubectl apply -f https://github.com/bitnami-labs/sealed-secrets/releases/download/v0.26.3/controller.yaml
          kubectl wait --for=condition=available deployment/sealed-secrets-controller \
            -n kube-system --timeout=90s

      - name: Aplicar namespace e ConfigMap
        run: |
          kubectl apply -f k8s/namespace.yaml
          kubectl apply -f k8s/configmap.yaml

      - name: Criar Secret com valores de CI
        run: |
          kubectl create secret generic vigilantia-secrets \
            --namespace vigilantia \
            --from-literal=DATABASE_URL="postgresql+asyncpg://vigilantia:ci_pass@postgres:5432/vigilantia" \
            --from-literal=ELASTICSEARCH_PASSWORD="ci_es_pass" \
            --from-literal=INGEST_API_KEY="ci_ingest_key_placeholder" \
            --from-literal=JWT_SECRET_KEY="ci_jwt_secret_key_placeholder_xxxxxx" \
            --from-literal=POSTGRES_PASSWORD="ci_pass" \
            --from-literal=SMTP_PASSWORD="ci_smtp_pass"

      - name: Aplicar manifests K8s
        run: |
          kubectl apply -f k8s/networkpolicy.yaml
          kubectl apply -f k8s/elasticsearch-statefulset.yaml
          kubectl apply -f k8s/postgres-statefulset.yaml
          kubectl apply -f k8s/auth-deployment.yaml
          kubectl apply -f k8s/parser-deployment.yaml
          kubectl apply -f k8s/gateway-deployment.yaml
          kubectl apply -f k8s/frontend-deployment.yaml
          kubectl apply -f k8s/filebeat-deployment.yaml
          kubectl apply -f k8s/hpa.yaml

      - name: Verificar objetos no cluster
        run: |
          echo "=== Deployments ===" && kubectl get deployments -n vigilantia
          echo "=== Services ===" && kubectl get services -n vigilantia
          echo "=== Pods ===" && kubectl get pods -n vigilantia
