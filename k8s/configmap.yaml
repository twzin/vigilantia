apiVersion: v1
kind: ConfigMap
metadata:
  name: vigilantia-config
  namespace: vigilantia
data:
  JWT_ALGORITHM: "HS256"
  ACCESS_TOKEN_EXPIRE_MINUTES: "60"
  ELASTICSEARCH_URL: "http://elasticsearch:9200"
  ELASTICSEARCH_USER: "elastic"
  AUTH_SERVICE_URL: "http://auth:8001"
  PARSER_SERVICE_URL: "http://parser:8002"
  POSTGRES_USER: "vigilantia"
  POSTGRES_DB: "vigilantia"
  DATABASE_URL: "postgresql+asyncpg://vigilantia:$(POSTGRES_PASSWORD)@postgres:5432/vigilantia"
  VITE_GATEWAY_URL: "http://localhost:8000"
  SMTP_HOST: "smtp.example.com"
  SMTP_PORT: "587"
  SMTP_USER: "alerts@example.com"
  ALERT_EMAIL_FROM: "alerts@vigilantia.local"
  ALERT_EMAIL_TO: "admin@vigilantia.local"
