apiVersion: apps/v1
kind: Deployment
metadata:
  name: parser
  namespace: vigilantia
spec:
  replicas: 2  # 2 réplicas iniciais — HPA pode escalar até 5
  selector:
    matchLabels:
      app: parser
  template:
    metadata:
      labels:
        app: parser
        tier: backend
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
      containers:
        - name: parser
          image: ghcr.io/twzin/vigilantia-parser:latest
          ports:
            - containerPort: 8002
          envFrom:
            - configMapRef:
                name: vigilantia-config
            - secretRef:
                name: vigilantia-secrets
          resources:
            requests:
              cpu: "200m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          readinessProbe:
            httpGet:
              path: /health
              port: 8002
            initialDelaySeconds: 20
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8002
            initialDelaySeconds: 40
            periodSeconds: 15
---
apiVersion: v1
kind: Service
metadata:
  name: parser
  namespace: vigilantia
spec:
  selector:
    app: parser
  ports:
    - port: 8002
      targetPort: 8002
