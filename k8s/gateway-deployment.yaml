apiVersion: apps/v1
kind: Deployment
metadata:
  name: gateway
  namespace: vigilantia
spec:
  replicas: 2
  selector:
    matchLabels:
      app: gateway
  template:
    metadata:
      labels:
        app: gateway
        tier: gateway
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
      containers:
        - name: gateway
          image: ghcr.io/twzin/vigilantia-gateway:latest
          ports:
            - containerPort: 8000
          envFrom:
            - configMapRef:
                name: vigilantia-config
            - secretRef:
                name: vigilantia-secrets
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "300m"
              memory: "256Mi"
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 20
            periodSeconds: 15
---
apiVersion: v1
kind: Service
metadata:
  name: gateway
  namespace: vigilantia
spec:
  selector:
    app: gateway
  type: NodePort
  ports:
    - port: 8000
      targetPort: 8000
      nodePort: 30800
