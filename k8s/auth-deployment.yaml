apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth
  namespace: vigilantia
spec:
  replicas: 1
  selector:
    matchLabels:
      app: auth
  template:
    metadata:
      labels:
        app: auth
        tier: backend
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
      containers:
        - name: auth
          image: ghcr.io/twzin/vigilantia-auth:latest
          ports:
            - containerPort: 8001
          envFrom:
            - configMapRef:
                name: vigilantia-config
            - secretRef:
                name: vigilantia-secrets
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "300m"
              memory: "256Mi"
          readinessProbe:
            httpGet:
              path: /health
              port: 8001
            initialDelaySeconds: 15
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8001
            initialDelaySeconds: 30
            periodSeconds: 15
---
apiVersion: v1
kind: Service
metadata:
  name: auth
  namespace: vigilantia
spec:
  selector:
    app: auth
  ports:
    - port: 8001
      targetPort: 8001
